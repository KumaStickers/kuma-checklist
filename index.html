<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐻 KumaStickers — Complete Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #E8785A;
    --coral-light: #fde8de;
    --coral-dark: #c45a3e;
    --cream: #fdf8f5;
    --dark: #2c1a10;
    --mid: #7a5540;
    --muted: #b09080;
    --border: #f0e8e0;
    --white: #ffffff;
    --green: #1a7a45;
    --green-light: #d4f5e2;
    --blue: #2563eb;
    --blue-light: #e6f1fb;
    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --amber: #b07d1a;
    --amber-light: #fff8e1;
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Nunito’, sans-serif;
background: var(–cream);
color: var(–dark);
padding-bottom: 80px;
}

/* ── HEADER ── */
.site-header {
background: var(–white);
border-bottom: 1.5px solid var(–border);
padding: 0 20px;
position: sticky;
top: 0;
z-index: 100;
}
.header-inner {
max-width: 680px;
margin: 0 auto;
padding: 16px 0 0;
}
.header-top {
display: flex;
justify-content: space-between;
align-items: flex-start;
margin-bottom: 14px;
}
.header-title h1 {
font-family: ‘Fraunces’, serif;
font-size: 22px;
font-weight: 700;
color: var(–dark);
line-height: 1.2;
}
.header-title p {
font-size: 12px;
color: var(–muted);
margin-top: 2px;
font-weight: 600;
}
.progress-ring-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
}
.progress-ring-wrap span {
font-size: 10px;
font-weight: 700;
color: var(–muted);
letter-spacing: 0.06em;
text-transform: uppercase;
}
.progress-ring {
width: 52px;
height: 52px;
transform: rotate(-90deg);
}
.progress-ring circle {
fill: none;
stroke-width: 4;
}
.ring-bg { stroke: var(–border); }
.ring-fill {
stroke: var(–coral);
stroke-linecap: round;
stroke-dasharray: 138;
stroke-dashoffset: 138;
transition: stroke-dashoffset 0.5s ease;
}
.ring-pct {
position: absolute;
font-size: 11px;
font-weight: 800;
color: var(–coral);
top: 50%;
left: 50%;
transform: translate(-50%, -50%) rotate(90deg);
}
.ring-container { position: relative; width: 52px; height: 52px; }

/* Phase tabs */
.phase-tabs {
display: flex;
gap: 0;
overflow-x: auto;
scrollbar-width: none;
-ms-overflow-style: none;
padding-bottom: 1px;
}
.phase-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
padding: 8px 14px;
border: none;
border-bottom: 3px solid transparent;
background: none;
font-family: ‘Nunito’, sans-serif;
font-size: 12px;
font-weight: 700;
color: var(–muted);
cursor: pointer;
white-space: nowrap;
transition: all 0.15s;
letter-spacing: 0.02em;
}
.tab-btn.active {
color: var(–coral);
border-bottom-color: var(–coral);
}

/* ── STATS BAR ── */
.stats-bar {
max-width: 680px;
margin: 16px auto 0;
padding: 0 16px;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}
.stat-card {
background: var(–white);
border: 1.5px solid var(–border);
border-radius: 14px;
padding: 12px;
text-align: center;
}
.stat-num {
font-size: 26px;
font-weight: 900;
color: var(–dark);
font-family: ‘Fraunces’, serif;
}
.stat-lbl {
font-size: 10px;
font-weight: 700;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.07em;
margin-top: 2px;
}

/* ── MAIN CONTENT ── */
.main {
max-width: 680px;
margin: 0 auto;
padding: 20px 16px 0;
}

/* ── PHASE SECTION ── */
.phase { display: none; }
.phase.active { display: block; }

/* Phase header */
.phase-header {
border-radius: 18px;
padding: 20px 22px;
margin-bottom: 16px;
position: relative;
overflow: hidden;
}
.phase-header::before {
content: ‘’;
position: absolute;
top: -20px; right: -20px;
width: 100px; height: 100px;
border-radius: 50%;
background: rgba(255,255,255,0.12);
}
.phase-header::after {
content: ‘’;
position: absolute;
bottom: -30px; right: 30px;
width: 70px; height: 70px;
border-radius: 50%;
background: rgba(255,255,255,0.08);
}
.phase-label {
font-size: 10px;
font-weight: 800;
letter-spacing: 0.1em;
text-transform: uppercase;
color: rgba(255,255,255,0.7);
margin-bottom: 4px;
}
.phase-title {
font-family: ‘Fraunces’, serif;
font-size: 20px;
font-weight: 700;
color: #fff;
line-height: 1.2;
margin-bottom: 4px;
}
.phase-machine {
font-size: 12px;
font-weight: 600;
color: rgba(255,255,255,0.75);
margin-bottom: 14px;
}
.phase-progress-wrap {
background: rgba(255,255,255,0.25);
border-radius: 99px;
height: 5px;
}
.phase-progress-bar {
height: 5px;
border-radius: 99px;
background: rgba(255,255,255,0.9);
transition: width 0.35s ease;
min-width: 5px;
}
.phase-count {
position: absolute;
top: 20px; right: 22px;
font-size: 13px;
font-weight: 800;
color: rgba(255,255,255,0.85);
background: rgba(255,255,255,0.18);
padding: 4px 12px;
border-radius: 99px;
}

/* ── SECTION WITHIN PHASE ── */
.section-title {
font-size: 11px;
font-weight: 800;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–muted);
margin: 24px 0 8px 4px;
}

/* ── ITEM CARD ── */
.item {
display: flex;
align-items: flex-start;
gap: 12px;
padding: 12px 14px;
background: var(–white);
border: 1.5px solid var(–border);
border-radius: 14px;
margin-bottom: 8px;
cursor: pointer;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.item:hover { border-color: var(–coral); background: #fffaf8; }
.item:active { transform: scale(0.98); }
.item.done {
background: #fafafa;
border-color: #ede8e4;
opacity: 0.65;
}
.item.done .item-title { text-decoration: line-through; color: var(–muted); }

.checkbox {
width: 22px;
height: 22px;
border-radius: 6px;
border: 2px solid var(–border);
flex-shrink: 0;
margin-top: 1px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
background: var(–white);
}
.checkbox svg { display: none; }
.checkbox.checked { border-color: transparent; }
.checkbox.checked svg { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-title {
font-size: 14px;
font-weight: 700;
color: var(–dark);
line-height: 1.4;
}
.item-sub {
font-size: 12px;
font-weight: 600;
color: var(–muted);
margin-top: 3px;
line-height: 1.5;
}
.item-code {
font-family: ‘Courier New’, monospace;
font-size: 11px;
background: #f0ece8;
color: var(–mid);
padding: 5px 8px;
border-radius: 6px;
margin-top: 6px;
display: block;
word-break: break-all;
}
.item-badge {
font-size: 10px;
font-weight: 800;
padding: 2px 8px;
border-radius: 99px;
flex-shrink: 0;
margin-top: 3px;
letter-spacing: 0.03em;
}

/* ── NAV BUTTONS ── */
.nav-row {
display: flex;
gap: 10px;
margin-top: 24px;
}
.nav-btn {
flex: 1;
padding: 14px;
border-radius: 14px;
border: none;
font-family: ‘Nunito’, sans-serif;
font-size: 14px;
font-weight: 800;
cursor: pointer;
transition: all 0.15s;
}
.nav-btn:active { transform: scale(0.97); }
.btn-prev { background: var(–border); color: var(–mid); }
.btn-next { background: var(–coral); color: #fff; }
.btn-next:hover { background: var(–coral-dark); }

/* ── RESET ── */
.reset-wrap {
text-align: center;
margin-top: 20px;
}
.reset-link {
font-size: 12px;
color: var(–muted);
cursor: pointer;
text-decoration: underline;
font-weight: 600;
background: none;
border: none;
font-family: ‘Nunito’, sans-serif;
}
.reset-link:hover { color: var(–coral); }

/* ── COMPLETION BANNER ── */
.complete-banner {
background: var(–green-light);
border: 1.5px solid #a3e4c0;
border-radius: 18px;
padding: 24px;
text-align: center;
margin-bottom: 20px;
display: none;
}
.complete-banner.show { display: block; }
.complete-banner h2 {
font-family: ‘Fraunces’, serif;
font-size: 22px;
color: var(–green);
margin-bottom: 6px;
}
.complete-banner p { font-size: 14px; color: var(–green); font-weight: 600; }

@media (prefers-color-scheme: dark) {
:root {
–cream: #1a1208;
–dark: #f5ede5;
–mid: #c4a888;
–muted: #8a7060;
–border: #3a2818;
–white: #241810;
}
.item:hover { background: #2a1e14; }
.item.done { background: #1e1410; }
.item-code { background: #2a1e14; color: #c4a888; }
.stat-card { background: #241810; }
.checkbox { background: #241810; }
.site-header { background: #241810; }
}
</style>

</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-title">
        <h1>🐻 KumaStickers</h1>
        <p>Complete launch guide · April 2026</p>
      </div>
      <div class="progress-ring-wrap">

          <svg class="progress-ring" viewBox="0 0 52 52">
            <circle class="ring-bg" cx="26" cy="26" r="22"/>
            <circle class="ring-fill" id="ringFill" cx="26" cy="26" r="22"/>
          </svg>

</header>

  <div class="stat-card"><div class="stat-num" id="statLeft">0</div><div class="stat-lbl">Left</div></div>
  <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
</div>

<div class="main" id="main"></div>

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {};
let currentPhase = 0;

const BADGE_CONFIG = {
  critical:  { bg: "#fde8de", color: "#c45a3e", label: "Critical" },
  important: { bg: "#fff8e1", color: "#b07d1a", label: "Important" },
  priority:  { bg: "#ede9fe", color: "#6d28d9",  label: "Priority" },
};

function load(){
  try { state = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ state={}; }
  try { currentPhase = parseInt(localStorage.getItem(KEY+"_phase") || "0"); } catch(e){ currentPhase=0; }
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
  try { localStorage.setItem(KEY+"_phase", currentPhase); } catch(e){}
}
function toggleItem(id){
  state[id] = !state[id];
  save();
  render();
}
function resetAll(){
  if(confirm("Reset all checkboxes? This cannot be undone.")){
    state = {};
    save();
    render();
  }
}
function goPhase(i){
  currentPhase = i;
  save();
  render();
  window.scrollTo(0, 0);
}

function countPhase(phase){
  let total = 0, done = 0;
  phase.sections.forEach(sec => {
    sec.items.forEach((item, ii) => {
      const idx = phase.sections.indexOf(sec);
      const id = phase.id + "_" + idx + "_" + ii;
      total++;
      if(state[id]) done++;
    });
  });
  return { total, done };
}

function countAll(){
  let total = 0, done = 0;
  PHASES.forEach(p => {
    const c = countPhase(p);
    total += c.total;
    done += c.done;
  });
  return { total, done };
}

function render(){
  const { total, done } = countAll();
  const pct = total ? Math.round(done / total * 100) : 0;

  // Ring
  const circ = 2 * Math.PI * 22;
  const offset = circ - (pct / 100) * circ;
  document.getElementById("ringFill").style.strokeDashoffset = offset;
  document.getElementById("ringFill").style.strokeDasharray = circ;
  document.getElementById("ringPct").textContent = pct + "%";

  // Stats
  document.getElementById("statDone").textContent = done;
  document.getElementById("statLeft").textContent = total - done;
  document.getElementById("statTotal").textContent = total;

  // Tabs
  document.getElementById("phaseTabs").innerHTML = PHASES.map((p, i) => {
    const c = countPhase(p);
    const allDone = c.done === c.total;
    return `<button class="tab-btn${i === currentPhase ? " active" : ""}" onclick="goPhase(${i})">
      ${allDone ? "✓ " : ""}${p.label}
    </button>`;
  }).join("");

  // Main content
  const p = PHASES[currentPhase];
  const pc = countPhase(p);
  const ppct = pc.total ? Math.round(pc.done / pc.total * 100) : 0;

  let html = `
    <div class="complete-banner${done === total ? " show" : ""}" id="completeBanner">
      <h2>🎉 All done!</h2>
      <p>KumaStickers is fully launched and running on autopilot every Monday.</p>
    </div>
    <div class="phase-header" style="background:${p.color}">
      <div class="phase-label">${p.label} of ${PHASES.length}</div>
      <div class="phase-title">${p.title}</div>
      <div class="phase-machine">${p.machine}</div>
      <div class="phase-progress-wrap">
        <div class="phase-progress-bar" style="width:${Math.max(ppct,2)}%"></div>
      </div>
      <div class="phase-count">${pc.done}/${pc.total}</div>
    </div>
  `;

  p.sections.forEach((sec, si) => {
    html += `<div class="section-title">${sec.title}</div>`;
    sec.items.forEach((item, ii) => {
      const id = p.id + "_" + si + "_" + ii;
      const chk = state[id];
      const badge = item.badge ? BADGE_CONFIG[item.badge] : null;
      const checkColor = chk ? p.color : "";
      html += `
        <div class="item${chk ? " done" : ""}" onclick="toggleItem('${id}')">
          <div class="checkbox${chk ? " checked" : ""}" style="${chk ? `background:${p.color};border-color:${p.color}` : ""}">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-body">
            <div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">
              <div class="item-title">${item.t}</div>
              ${badge ? `<span class="item-badge" style="background:${badge.bg};color:${badge.color}">${badge.label}</span>` : ""}
            </div>
            ${item.s ? `<div class="item-sub">${item.s}</div>` : ""}
            ${item.code ? `<code class="item-code">${item.code.replace(/\n/g, "<br>")}</code>` : ""}
          </div>
        </div>
      `;
    });
  });

  // Nav
  html += `<div class="nav-row">`;
  if(currentPhase > 0) html += `<button class="nav-btn btn-prev" onclick="goPhase(${currentPhase-1})">← ${PHASES[currentPhase-1].label}</button>`;
  if(currentPhase < PHASES.length - 1) html += `<button class="nav-btn btn-next" onclick="goPhase(${currentPhase+1})">${PHASES[currentPhase+1].label} →</button>`;
  html += `</div>`;

  html += `<div class="reset-wrap"><button class="reset-link" onclick="resetAll()">reset all checkboxes</button></div>`;

  document.getElementById("main").innerHTML = html;
}

load();
render();
</script>
